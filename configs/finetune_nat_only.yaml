# Naturalness-only training with large VoiceCLAP (7B)
# Single reward (CLAP cosine similarity) — no centroid/quality/speaker_sim
# Non-differentiable reward with INT4 quantized 7B CLAP
# Train from LaionBox v0.1-wip checkpoint with lower LR

# ── Data source ────────────────────────────────────────────────────────
preprocessed_dir: "./finetune_data_combined"
index_file: "./finetune_data_combined/index_mixed.json"

# ── Bucket-weighted sampling (used by BucketWeightedSampler) ──────────
bucket_weights:
  dramabox: 0.4
  emolia: 0.2
  podcast: 0.4

# ── Podcast epochs: train until podcast bucket seen 2 times ────────────
podcast_epochs: 2

# ── DramaBox model paths ──────────────────────────────────────────────
dramabox_dir: "/home/deployer/laion/DramaBox"
checkpoint: "/home/deployer/laion/DramaBox/models/ltx-2.3-22b-dev-audio-only-v13-merged.safetensors"
full_checkpoint: "/home/deployer/laion/DramaBox/models/ltx-2.3-22b-dev.safetensors"
gemma_root: "/home/deployer/.cache/dramabox/models--unsloth--gemma-3-12b-it-bnb-4bit/snapshots/826e729dbaeea4ecb143738eed2bcf3539ebf7bf"
base_model: "dev"

# ── LoRA ──────────────────────────────────────────────────────────────
lora_rank: 128
lora_alpha: 128
lora_dropout: 0.05
resume_lora: "/home/deployer/.cache/huggingface/hub/models--laion--laionbox-v0.1-wip/snapshots/66176d2a653a013a7b71c1ccb7a7a4d4cf514b0d/lora_epoch5.safetensors"

# ── Training ──────────────────────────────────────────────────────────
lr: 2.0e-5
lr_scheduler: "cosine"
warmup_steps: 40
batch_size: 1
grad_accum: 32               # effective batch = 8 GPUs × 1 × 32 = 256
max_grad_norm: 1.0
seed: 42
expand_all_modes: true
max_ref_tokens: 250
text_dropout: 0.1

# ── Naturalness-only reward (non-differentiable, with large CLAP) ─────
clap_loss: true
differentiable_reward: false
clap_model: "gijs/voiceclap-lco-7b-lora"
clap_quantize: "int4"
aux_sigma_max: 0.4
aux_target_ratio: 6.0
coeff_cap: 10.0
no_centroid: true
no_speaker_sim: true
no_quality_mlp: true
positive_text: "Realistic, genuine, spontaneous, authentic, sensual, natural voice with all imperfections and organic microdistractions a natural situation brings with it"
negative_text: "distorted, unnatural, robotic, distortion"

# ── Checkpoint management ────────────────────────────────────────────
output_dir: "./finetune_output/nat_only_2ep"
save_every: 10
keep_last_n: 3
log_every: 10
monitor_port: 8767

# ── Validation ────────────────────────────────────────────────────────
val_samples: 0  # disable validation during training (run after)

# ── Expected training stats ──────────────────────────────────────────
# 2 podcast epochs × ~117 steps/epoch = ~234 total optimizer steps
# Warmup: 40 steps (linear 0.01× → 1×), then hold + cosine decay
# Save every 10 steps → ~23 save events, keeping last 3 + better older
# Effective batch: 8 GPUs × 1 × 32 = 256
# ~40% of micro-steps trigger CLAP reward (sigma < 0.4)
# CLAP inference per micro-step: ~1-2s on INT4 → ~13s overhead per optimizer step

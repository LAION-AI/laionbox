# FAIR Run: Nat+Speaker Sim+Quality MLP (no centroid), 2 epochs on 6 GPUs
# Resumes from Run 14 step 100 (best available checkpoint)
# Effective batch: 6 GPUs × 1 × 32 = 192
# Continuous evaluation on GPUs 6-7 via fair_eval_worker.py

# ── Data source ────────────────────────────────────────────────────────
preprocessed_dir: "./finetune_data_combined"
index_file: "./finetune_data_combined/index_mixed.json"

bucket_weights:
  dramabox: 0.4
  emilia: 0.2
  podcast: 0.4

podcast_epochs: 2

# ── DramaBox model paths ──────────────────────────────────────────────
dramabox_dir: "/home/deployer/laion/DramaBox"
checkpoint: "/home/deployer/laion/DramaBox/models/ltx-2.3-22b-dev-audio-only-v13-merged.safetensors"
full_checkpoint: "/home/deployer/laion/DramaBox/models/ltx-2.3-22b-dev.safetensors"
gemma_root: "/home/deployer/.cache/dramabox/models--unsloth--gemma-3-12b-it-bnb-4bit/snapshots/826e729dbaeea4ecb143738eed2bcf3539ebf7bf"
base_model: "dev"

# ── LoRA ──────────────────────────────────────────────────────────────
lora_rank: 128
lora_alpha: 128
lora_dropout: 0.05
resume_lora: "/home/deployer/laion/Voice-Acting-Pipeline/finetune_output/diff_nat_spk_quality_2ep_cont/lora_step_00100.safetensors"

# ── Training ──────────────────────────────────────────────────────────
lr: 4.0e-5
lr_scheduler: "cosine"
warmup_steps: 62
batch_size: 1
grad_accum: 32
max_grad_norm: 1.0
seed: 42
expand_all_modes: true
max_ref_tokens: 200
text_dropout: 0.1

# ── Differentiable auxiliary rewards ─────────────────────────────────
clap_loss: true
differentiable_reward: true
diff_reward_checkpoint: true
aux_target_ratio: 5.0
coeff_cap: 10.0
aux_sigma_max: 0.4
no_centroid: true
no_speaker_sim: false
no_quality_mlp: false
positive_text: "Realistic, genuine, spontaneous, authentic, sensual, natural voice with all imperfections and organic microdistractions a natural situation brings with it"
negative_text: "distorted, unnatural, robotic, distortion"
classifiers_dir: "./classifiers"

# ── Checkpoint management ────────────────────────────────────────────
output_dir: "./finetune_output/fair_nat_spk_quality"
save_every: 10
keep_last_n: 5
log_every: 2
monitor_port: 8776

val_samples: 0
no_save_state: true

# Run 16: Full fine-tuning on podcast only (merged s130 base)
# No LoRA, no auxiliary losses, just flow matching loss
# FSDP SHARD_GRAD_OP across 8 GPUs
# Effective batch: 8 GPUs × 1 × 16 = 128

# ── Data source ────────────────────────────────────────────────────────
preprocessed_dir: "./finetune_data_combined"
index_file: "./finetune_data_combined/index_mixed.json"

bucket_weights:
  podcast: 1.0

podcast_epochs: 1

# ── DramaBox model paths ──────────────────────────────────────────────
dramabox_dir: "/home/deployer/laion/DramaBox"
checkpoint: "/home/deployer/laion/Voice-Acting-Pipeline/finetune_output/merged_s130/merged_s130.safetensors"
full_checkpoint: "/home/deployer/laion/DramaBox/models/ltx-2.3-22b-dev.safetensors"
gemma_root: "/home/deployer/.cache/dramabox/models--unsloth--gemma-3-12b-it-bnb-4bit/snapshots/826e729dbaeea4ecb143738eed2bcf3539ebf7bf"
base_model: "dev"

# ── Full fine-tuning (no LoRA) ────────────────────────────────────────
full_ft: true

# ── Training ──────────────────────────────────────────────────────────
lr: 2.0e-6
lr_scheduler: "cosine"
warmup_steps: 10
batch_size: 1
grad_accum: 16
max_grad_norm: 1.0
seed: 42
expand_all_modes: true
max_ref_tokens: 200
text_dropout: 0.1

# ── No auxiliary losses ───────────────────────────────────────────────
clap_loss: false

# ── Checkpoint management ────────────────────────────────────────────
output_dir: "./finetune_output/full_ft_podcast_1ep"
save_every: 10
log_every: 5
monitor_port: 8778

val_samples: 0
no_save_state: true

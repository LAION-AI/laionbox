# Bucket-Weighted Training: Run 9
# Resume from Run 7 (diff_reward_5ep, pre-augmentation checkpoint)
# Balanced sampling: DramaBox 50%, Podcast 35%, Emolia 10%, Augmented 5%
# Train until podcast seen 5 times (= 5 "podcast epochs")
#
# Dataset breakdown (with bucket weights):
#   DramaBox:  3,247 samples × 3 modes = 9,741 items (50% → ~14,000/epoch, 1.4× each)
#   Podcast:   ~9,800 samples × 1 mode  = 9,800 items (35% → 9,800/epoch, 1.0× each)  [ANCHOR]
#   Emolia:    5,990 samples × 1 mode   = 5,990 items (10% → 2,800/epoch, 0.5× each)
#   Augmented: 6,435 samples × 1 mode   = 6,435 items (5%  → 1,400/epoch, 0.2× each)
#   Total per epoch: ~28,000 items
#
# Over 5 podcast-epochs:
#   Podcast: 5× per item
#   DramaBox: ~7.2× per item (21.5× per sample across 3 modes)
#   Emolia: ~2.3× per item
#   Augmented: ~1.1× per item
#
# effective batch = 8 GPUs × 1 × 32 grad_accum = 256
# steps/epoch ≈ 28,000 / 256 ≈ 109
# total steps ≈ 109 × 5 = 547

preprocessed_dir: ./finetune_data_combined
output_dir: ./finetune_output/bucket_weighted_5ep
dramabox_dir: /home/deployer/laion/DramaBox
checkpoint: /home/deployer/laion/DramaBox/models/ltx-2.3-22b-dev-audio-only-v13-merged.safetensors
full_checkpoint: /home/deployer/laion/DramaBox/models/ltx-2.3-22b-dev.safetensors
gemma_root: /home/deployer/.cache/dramabox/models--unsloth--gemma-3-12b-it-bnb-4bit/snapshots/826e729dbaeea4ecb143738eed2bcf3539ebf7bf

base_model: dev
lora_rank: 128
lora_alpha: 128
lora_dropout: 0.05

# Resume from Run 7 checkpoint (before augmentation was added)
resume_lora: ./finetune_output/diff_reward_5ep/lora_epoch5.safetensors
index_file: ./finetune_data_combined/index_with_podcast.json

# Bucket-weighted sampling
bucket_weights:
  dramabox: 0.50
  podcast: 0.35
  emolia: 0.10
  augmented: 0.05
podcast_epochs: 5

# Slightly higher learning rate (was 4e-5 in Run 8)
lr: 5.0e-5
lr_scheduler: cosine
warmup_steps: 40
batch_size: 1
grad_accum: 32
max_grad_norm: 1.0
max_ref_tokens: 200
text_dropout: 0.1

# Multi-auxiliary loss settings (same as Run 8)
clap_loss: true
aux_target_ratio: 5.0
speaker_sim_ratio: 5.0
coeff_cap: 10.0
aux_sigma_max: 0.4
positive_text: "Realistic, genuine, spontaneous, authentic, sensual, natural voice with all imperfections and organic microdistractions a natural situation brings with it"
negative_text: "distorted, unnatural, robotic, distortion"
classifiers_dir: ./classifiers

# Differentiable reward
differentiable_reward: true
diff_reward_checkpoint: true

expand_all_modes: true
save_every: 55
log_every: 2
seed: 42
val_samples: 10
val_refs_dir: /home/deployer/laion/test-refs
monitor_port: 8773

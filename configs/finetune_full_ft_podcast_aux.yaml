# Run 17: Full fine-tuning with auxiliary losses on podcast only
# Same starting point as Run 16 (merged s130 base), same LR (2e-6)
# But with naturalness, quality MLP, and speaker similarity rewards
# Non-differentiable mode (CLAP-small for training)
# Effective batch: 8 GPUs x 1 x 16 = 128

# -- Data source ---------------------------------------------------------------
preprocessed_dir: "./finetune_data_combined"
index_file: "./finetune_data_combined/index_mixed.json"

bucket_weights:
  podcast: 1.0

podcast_epochs: 1

# -- DramaBox model paths ------------------------------------------------------
dramabox_dir: "/home/deployer/laion/DramaBox"
checkpoint: "/home/deployer/laion/Voice-Acting-Pipeline/finetune_output/merged_s130/merged_s130.safetensors"
full_checkpoint: "/home/deployer/laion/DramaBox/models/ltx-2.3-22b-dev.safetensors"
gemma_root: "/home/deployer/.cache/dramabox/models--unsloth--gemma-3-12b-it-bnb-4bit/snapshots/826e729dbaeea4ecb143738eed2bcf3539ebf7bf"
base_model: "dev"

# -- Full fine-tuning (no LoRA) ------------------------------------------------
full_ft: true

# -- Training ------------------------------------------------------------------
lr: 2.0e-6
lr_scheduler: "cosine"
warmup_steps: 10
batch_size: 1
grad_accum: 16
max_grad_norm: 1.0
seed: 42
expand_all_modes: true
max_ref_tokens: 200
text_dropout: 0.1

# -- Auxiliary losses (non-differentiable) -------------------------------------
clap_loss: true
differentiable_reward: false
clap_model: "laion/voiceclap-small"
aux_sigma_max: 0.4
aux_target_ratio: 6.0
coeff_cap: 10.0

# Enable: naturalness (CLAP), quality MLP, speaker similarity
# Disable: centroid (not requested)
no_centroid: true
no_speaker_sim: false
no_quality_mlp: false

positive_text: "Realistic, genuine, spontaneous, authentic, sensual, natural voice with all imperfections and organic microdistractions a natural situation brings with it"
negative_text: "distorted, unnatural, robotic, distortion"

# -- Checkpoint management -----------------------------------------------------
output_dir: "./finetune_output/full_ft_podcast_aux_1ep"
save_every: 10
log_every: 5
monitor_port: 8779
no_save_state: true

val_samples: 0

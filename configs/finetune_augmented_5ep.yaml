# Augmented data + Differentiable Reward: 5 epochs
# Resume from diff_reward_5ep (high naturalness checkpoint)
# Added 6,435 augmented voice pairs (51 effects applied to emolia ref+tgt)
# Increased speaker similarity influence (speaker_sim_ratio 8.0 vs base 5.0)
#
# Dataset breakdown:
#   DramaBox: 3247 samples × 3 modes = 9741 items
#   Emolia: 598 samples × 1 mode = 598 items
#   Augmented: ~6435 samples × 1 mode = 6435 items
#   Total: ~16774 items/epoch
# effective batch = 8 GPUs × 1 × 32 grad_accum = 256
# steps/epoch ≈ 16774 / 256 ≈ 66
# warmup: 33 steps (half of first epoch)

preprocessed_dir: ./finetune_data_combined
output_dir: ./finetune_output/augmented_5ep
dramabox_dir: /home/deployer/laion/DramaBox
checkpoint: /home/deployer/laion/DramaBox/models/ltx-2.3-22b-dev-audio-only-v13-merged.safetensors
full_checkpoint: /home/deployer/laion/DramaBox/models/ltx-2.3-22b-dev.safetensors
gemma_root: /home/deployer/.cache/dramabox/models--unsloth--gemma-3-12b-it-bnb-4bit/snapshots/826e729dbaeea4ecb143738eed2bcf3539ebf7bf

base_model: dev
lora_rank: 128
lora_alpha: 128
lora_dropout: 0.05

resume_lora: ./finetune_output/diff_reward_5ep/lora_epoch5.safetensors
index_file: ./finetune_data_combined/index_with_augmented.json

epochs: 5
lr: 4.0e-5
lr_scheduler: cosine
warmup_steps: 32
batch_size: 1
grad_accum: 32
max_grad_norm: 1.0
max_ref_tokens: 200
text_dropout: 0.1

# Multi-auxiliary loss settings
clap_loss: true
aux_target_ratio: 5.0
speaker_sim_ratio: 8.0
coeff_cap: 10.0
aux_sigma_max: 0.4
positive_text: "Realistic, genuine, spontaneous, authentic, sensual, natural voice with all imperfections and organic microdistractions a natural situation brings with it"
negative_text: "distorted, unnatural, robotic, distortion"
classifiers_dir: ./classifiers

# Differentiable reward mode (backprop through CLAP/decoder/WavLM)
differentiable_reward: true
diff_reward_checkpoint: true

expand_all_modes: true
save_every: 65
log_every: 2
seed: 42
val_samples: 10
val_refs_dir: /home/deployer/laion/test-refs
monitor_port: 8772
